<!DOCTYPE HTML>
<html>
<head>
    <title>Pinchzoom.js Demo</title>
    
    <link rel="stylesheet" href="../demo/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9.2.4/swiper-bundle.min.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <script src="https://cdn.jsdelivr.net/npm/swiper@9.2.4/swiper-bundle.min.js"></script>
    <script type="text/javascript" src="../src/pinch-zoom.js"></script>
</head>
<body>
  <style>
    .pd-thumblist-swiper{ max-width:485px; overflow: hidden; }
    .pinch-zoom-parent {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }
    .pinch-zoom-container{
      height: 820px;
    }
    .pinch-zoom {
      width: 100%;
      height: 100%;
    }
    .pinch-zoom img {
      width: 100%;
      display: block;
    }
  </style>
    <div class="page">
        <div class="description">
            <h1>Pinchzoom.js</h1>
            <p>
                Multi-touch zoom in Javascript - test02
            </p>
        </div>
        <div class="pd-thumblist-swiper">
            <ul class="swiper-wrapper">
                <li class="swiper-slide">
                  <div class="pinch-zoom-parent">
                    <div class="pinch-zoom">
                        <img src="frog.jpg"/>
                    </div>
                  </div>
                </li>
                <li class="swiper-slide">
                  <div class="pinch-zoom-parent">
                    <div class="pinch-zoom">
                        <img src="frog.jpg"/>
                    </div>
                  </div>
                </li>
                <li class="swiper-slide">
                  <div class="pinch-zoom-parent">
                    <div class="pinch-zoom">
                        <img src="frog.jpg"/>
                    </div>
                  </div>
                </li>
                <li class="swiper-slide">
                  <div class="pinch-zoom-parent">
                    <div class="pinch-zoom">
                        <img src="frog.jpg"/>
                    </div>
                  </div>
                </li>
            </ul>

    </div>

    <script type='text/javascript'>
      // 1️⃣ PinchZoom 인스턴스 저장
      const pinchInstances = [];

      document.querySelectorAll('.pinch-zoom').forEach(function (el) {
        const instance = new PinchZoom.default(el, {});
        pinchInstances.push(instance);
      });

      // 2️⃣ Swiper 생성 + 슬라이드 변경 시 이전 슬라이드 reset
      const swiper = new Swiper('.pd-thumblist-swiper', {
        speed: 300,
        nested: true,
        touchStartPreventDefault: false,
        on: {
          slideChangeTransitionStart: function () {
            const prevIndex = this.previousIndex;

            if (pinchInstances[prevIndex]) {
              pinchInstances[prevIndex].reset();
            }
          }
        }
      });
    </script>

</body>
</html>
